# Standard-Konfiguration für NovaTech API
replicaCount: 2

image:
  repository: nginx  # Simuliert API-Server
  tag: "1.25-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  hostname: api.novatech.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  databaseHost: postgres-service
  databasePort: "5432"
  logLevel: info

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
